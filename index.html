<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>XWORM V19 | ULTRA CONTROL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --red: #fe2c55; --cyan: #25f4ee; --dark: #000; --gray: #262626; --nav-h: 70px; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark); color: #fff; height: 100vh; overflow: hidden; position: fixed; width: 100%; }

        /* FEED AREA */
        #feed-view { height: calc(100vh - var(--nav-h)); overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #feed-view::-webkit-scrollbar { display: none; }
        .v-card { width: 100%; height: 100%; scroll-snap-align: start; scroll-snap-stop: always; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }

        /* PROGRESS BAR INDICATOR */
        .v-progress { position: absolute; bottom: 0; left: 0; height: 2px; background: var(--red); width: 0%; z-index: 15; transition: width 0.1s linear; }
        .v-buffer { position: absolute; bottom: 0; left: 0; height: 2px; background: rgba(255,255,255,0.2); width: 100%; z-index: 14; }

        /* UI OVERLAY */
        .overlay { position: absolute; inset: 0; pointer-events: none; display: flex; flex-direction: column; justify-content: flex-end; padding: 25px 15px 45px; z-index: 10; background: linear-gradient(0deg, rgba(0,0,0,0.6), transparent 50%); }
        .overlay > * { pointer-events: auto; }
        .u-info b { font-size: 1.1rem; text-shadow: 2px 2px 4px #000; cursor: pointer; }
        .u-info p { font-size: 14px; margin-top: 4px; text-shadow: 1px 1px 3px #000; opacity: 0.9; }

        /* SIDEBAR */
        .side-bar { position: absolute; right: 10px; bottom: 100px; display: flex; flex-direction: column; align-items: center; gap: 20px; z-index: 20; }
        .side-btn { text-align: center; cursor: pointer; filter: drop-shadow(0 2px 5px #000); }
        .side-btn i { font-size: 30px; }
        .side-btn span { font-size: 11px; font-weight: bold; display: block; margin-top: 2px; }

        /* AVATAR SYSTEM (ABU-ABU DEFAULT) */
        .pfp-ring { width: 48px; height: 48px; border-radius: 50%; border: 2px solid #fff; background: var(--gray); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .pfp-ring img { width: 100%; height: 100%; object-fit: cover; }
        .pfp-ring i { color: #888; font-size: 22px; }
        .plus-btn { position: absolute; bottom: -5px; background: var(--red); border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; border: 1.5px solid #fff; font-size: 9px; }

        /* MUSIC DISC */
        .music-disc { width: 42px; height: 42px; border-radius: 50%; border: 8px solid #222; animation: spin 4s linear infinite; background: #111; display: flex; align-items: center; justify-content: center; }
        .music-disc img { width: 18px; height: 18px; border-radius: 50%; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* SCREEN & MODAL */
        .screen { display: none; position: absolute; inset: 0; background: #000; z-index: 100; overflow-y: auto; padding-bottom: 80px; }
        .screen.active { display: block; }
        .p-head { text-align: center; padding: 40px 20px; border-bottom: 1px solid #1a1a1a; }
        .p-img-l { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--cyan); margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; background: var(--gray); overflow: hidden; cursor: pointer; }
        .p-img-l img { width: 100%; height: 100%; object-fit: cover; }
        .p-img-l i { font-size: 40px; color: #888; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; }
        .grid-v { aspect-ratio: 9/16; background: #111; position: relative; }
        .grid-v video { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }

        /* COMMENTS PANEL */
        .comm-panel { position: fixed; bottom: 0; width: 100%; height: 65vh; background: #121212; z-index: 1000; border-radius: 15px 15px 0 0; display: none; flex-direction: column; padding: 15px; }
        .comm-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid #222; }
        .comm-list { flex: 1; overflow-y: auto; padding: 15px 0; }
        .comm-box { display: flex; gap: 10px; padding-top: 10px; border-top: 1px solid #222; }

        /* NAVBAR */
        .nav { position: fixed; bottom: 0; width: 100%; height: var(--nav-h); background: #000; border-top: 1px solid #222; display: flex; z-index: 200; }
        .nav-it { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #777; font-size: 10px; cursor: pointer; }
        .nav-it.active { color: #fff; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .m-box { background: #1a1a1a; width: 100%; padding: 25px; border-radius: 15px; }
        input, textarea { width: 100%; padding: 12px; background: #252525; border: none; color: #fff; border-radius: 8px; margin: 8px 0; }
    </style>
</head>
<body>

<div id="feed-view"></div>

<div id="v-profile" class="screen">
    <div style="padding:15px;" onclick="closeP()"><i class="fas fa-arrow-left fa-lg"></i></div>
    <div class="p-head">
        <div class="p-img-l" id="ui-pfp" onclick="editPfp()"></div>
        <h2 id="ui-nick">@username</h2>
        <div style="display:flex; justify-content:center; gap:35px; margin:20px 0;">
            <div><b id="ui-fol">0</b><br><small>Followers</small></div>
            <div><b id="ui-lik">0</b><br><small>Likes</small></div>
        </div>
        <div id="ui-btn-area"></div>
    </div>
    <div id="ui-grid" class="grid"></div>
</div>

<div id="comm-panel" class="comm-panel">
    <div class="comm-header"><b>Komentar</b><i class="fas fa-times fa-lg" onclick="closeComm()"></i></div>
    <div id="comm-list" class="comm-list"></div>
    <div class="comm-box">
        <input type="text" id="comm-input" placeholder="Tulis komentar...">
        <button onclick="postComm()" style="background:var(--red); border:none; color:#fff; padding:0 15px; border-radius:8px;">Kirim</button>
    </div>
</div>

<div class="nav">
    <div class="nav-it active" onclick="goHome()"><i class="fas fa-home fa-xl"></i><span>Beranda</span></div>
    <div class="nav-it" onclick="openM('upM')"><i class="fas fa-plus-square" style="font-size:32px;"></i></div>
    <div class="nav-it" onclick="openMyP()"><i class="fas fa-user-circle fa-xl"></i><span>Profil</span></div>
</div>

<div id="logM" class="modal" style="display:flex;">
    <div class="m-box" style="text-align:center;">
        <h2 style="color:var(--cyan); margin-bottom:15px;">XWORM V19</h2>
        <input type="text" id="reg-n" placeholder="Nickname...">
        <button onclick="register()" style="width:100%; padding:14px; background:var(--red); color:#fff; border:none; border-radius:8px; font-weight:bold;">MULAI</button>
    </div>
</div>

<div id="upM" class="modal">
    <div class="m-box">
        <h3>Publish New Reel</h3>
        <input type="file" id="u-file" accept="video/*">
        <textarea id="u-desc" placeholder="Tulis sesuatu..."></textarea>
        <button id="u-btn" onclick="upload()" style="width:100%; padding:14px; background:var(--red); color:#fff; border:none; border-radius:8px;">PUBLISH</button>
        <p onclick="closeM('upM')" style="text-align:center; color:#555; margin-top:10px; cursor:pointer;">Batalkan</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, onSnapshot, doc, updateDoc, increment, getDoc, setDoc, deleteDoc, where, query, arrayUnion, arrayRemove, orderBy } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD3usv5rw801fV1nrXIwyDQ6eYEzC7hDk0", authDomain: "kodangz.firebaseapp.com",
        projectId: "kodangz", storageBucket: "kodangz.firebasestorage.app",
        messagingSenderId: "306989473099", appId: "1:306989473099:web:9049d3135ce13e08a8dcce"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let user = JSON.parse(localStorage.getItem('xw_v19')) || null;
    let currentVidId = "";

    if(user) { document.getElementById('logM').style.display='none'; initFeed(); syncUser(); }

    window.register = async () => {
        const n = document.getElementById('reg-n').value.trim();
        if(!n) return;
        const u = { nick: n, pfp: "", followers: 0, following: [], likes: 0 };
        await setDoc(doc(db, "users", n), u);
        localStorage.setItem('xw_v19', JSON.stringify(u));
        location.reload();
    };

    async function syncUser() { onSnapshot(doc(db, "users", user.nick), (d) => { if(d.exists()) user = d.data(); }); }

    // --- VIDEO & PLAYER ENGINE ---
    async function initFeed() {
        const snap = await getDocs(collection(db, "global_videos"));
        const f = document.getElementById('feed-view'); f.innerHTML = "";
        let vids = []; snap.forEach(d => vids.push({id: d.id, ...d.data()}));
        vids.sort(() => Math.random() - 0.5);

        vids.forEach(v => {
            const avatarHtml = v.userPfp ? `<img src="${v.userPfp}">` : `<i class="fas fa-user"></i>`;
            f.innerHTML += `
            <div class="v-card">
                <video src="${v.url}" loop playsinline muted onclick="togglePlay(this)"></video>
                <div class="v-buffer"></div>
                <div class="v-progress" id="prog-${v.id}"></div>
                <div class="overlay">
                    <div class="u-info" onclick="openP('${v.user}')"><b>@${v.user}</b><p>${v.desc}</p></div>
                </div>
                <div class="side-bar">
                    <div class="pfp-ring" onclick="openP('${v.user}')">${avatarHtml}<div class="plus-btn"><i class="fas fa-plus"></i></div></div>
                    <div class="side-btn" onclick="like('${v.id}','${v.user}', this)"><i class="fas fa-heart"></i><span>${v.likes}</span></div>
                    <div class="side-btn" onclick="openComm('${v.id}')"><i class="fas fa-comment-dots"></i><span>0</span></div>
                    <div class="side-btn" onclick="window.open('https://wa.me/?text=${v.url}')"><i class="fas fa-share"></i></div>
                    <div class="music-disc">${v.userPfp ? `<img src="${v.userPfp}">` : `<i class="fas fa-music" style="font-size:12px;color:#555"></i>`}</div>
                </div>
            </div>`;
        });

        setupVideoEvents();
    }

    function setupVideoEvents() {
        const obs = new IntersectionObserver((es) => {
            es.forEach(e => {
                const v = e.target.querySelector('video');
                const prog = e.target.querySelector('.v-progress');
                if(e.isIntersecting) { 
                    v.play(); v.muted = false;
                    v.ontimeupdate = () => { prog.style.width = (v.currentTime / v.duration * 100) + "%"; };
                } else { v.pause(); }
            });
        }, { threshold: 0.8 });
        document.querySelectorAll('.v-card').forEach(c => obs.observe(c));
    }

    window.togglePlay = (v) => { if(v.paused) v.play(); else v.pause(); };

    // --- SOCIAL ENGINE ---
    window.like = async (id, t, el) => {
        await updateDoc(doc(db,"global_videos",id), {likes: increment(1)});
        await updateDoc(doc(db,"users",t), {likes: increment(1)});
        el.querySelector('i').style.color = "var(--red)";
        const s = el.querySelector('span'); s.innerText = parseInt(s.innerText) + 1;
    };

    window.openComm = async (id) => {
        currentVidId = id;
        document.getElementById('comm-panel').style.display = 'flex';
        const q = query(collection(db, "global_videos", id, "comments"), orderBy("time", "asc"));
        onSnapshot(q, (snap) => {
            const l = document.getElementById('comm-list'); l.innerHTML = "";
            snap.forEach(d => { l.innerHTML += `<div style="margin-bottom:8px;font-size:14px;"><b style="color:var(--cyan)">${d.data().user}:</b> ${d.data().text}</div>`; });
        });
    };
    window.closeComm = () => document.getElementById('comm-panel').style.display='none';
    window.postComm = async () => {
        const t = document.getElementById('comm-input').value; if(!t) return;
        await addDoc(collection(db, "global_videos", currentVidId, "comments"), { user: user.nick, text: t, time: new Date() });
        document.getElementById('comm-input').value = "";
    };

    window.openP = async (n) => {
        document.querySelectorAll('video').forEach(v => v.pause());
        document.getElementById('v-profile').classList.add('active');
        const d = (await getDoc(doc(db,"users",n))).data();
        document.getElementById('ui-nick').innerText = "@" + d.nick;
        document.getElementById('ui-fol').innerText = d.followers;
        document.getElementById('ui-lik').innerText = d.likes;
        document.getElementById('ui-pfp').innerHTML = d.pfp ? `<img src="${d.pfp}">` : `<i class="fas fa-user"></i>`;
        
        const area = document.getElementById('ui-btn-area');
        if(n !== user.nick) {
            const isF = user.following?.includes(n);
            area.innerHTML = `<button onclick="fol('${n}')" style="background:${isF?'#333':'var(--red)'}; color:#fff; border:none; padding:10px 40px; border-radius:5px; font-weight:bold;">${isF?'Following':'Follow'}</button>`;
        } else { area.innerHTML = ""; }

        const q = query(collection(db,"global_videos"), where("user","==",n));
        const vS = await getDocs(q);
        const g = document.getElementById('ui-grid'); g.innerHTML = "";
        vS.forEach(v => {
            g.innerHTML += `<div class="grid-v"><video src="${v.data().url}"></video>${n===user.nick?`<button onclick="delVid('${v.id}')" style="position:absolute;top:5px;right:5px;background:red;border:none;color:#fff;font-size:10px;padding:3px;">HAPUS</button>`:''}</div>`;
        });
    };

    window.fol = async (t) => {
        const isF = user.following?.includes(t);
        if(isF) {
            await updateDoc(doc(db,"users",user.nick), {following: arrayRemove(t)});
            await updateDoc(doc(db,"users",t), {followers: increment(-1)});
        } else {
            await updateDoc(doc(db,"users",user.nick), {following: arrayUnion(t)});
            await updateDoc(doc(db,"users",t), {followers: increment(1)});
        }
        openP(t);
    };

    window.editPfp = async () => {
        if(document.getElementById('ui-nick').innerText !== "@"+user.nick) return;
        const url = prompt("Link Foto Baru (URL):", user.pfp);
        if(url) { await updateDoc(doc(db, "users", user.nick), { pfp: url }); location.reload(); }
    };

    window.upload = async () => {
        const f = document.getElementById('u-file').files[0]; if(!f) return;
        const b = document.getElementById('u-btn'); b.disabled = true; b.innerText = "WAIT...";
        const fd = new FormData(); fd.append('file',f); fd.append('upload_preset','qz8ltfpp');
        const res = await fetch('https://api.cloudinary.com/v1_1/dax2e73hm/video/upload',{method:'POST',body:fd});
        const d = await res.json();
        await addDoc(collection(db,"global_videos"), {user:user.nick, userPfp:user.pfp, url:d.secure_url, desc:document.getElementById('u-desc').value, likes:0, timestamp: new Date()});
        location.reload();
    };

    window.delVid = async (id) => { if(confirm("Hapus Global?")) { await deleteDoc(doc(db,"global_videos",id)); openP(user.nick); } };
    window.goHome = () => { document.getElementById('v-profile').classList.remove('active'); initFeed(); };
    window.openMyP = () => openP(user.nick);
    window.closeP = () => { document.getElementById('v-profile').classList.remove('active'); initFeed(); };
    window.openM = (id) => document.getElementById(id).style.display = 'flex';
    window.closeM = (id) => document.getElementById(id).style.display = 'none';
</script>
</body>
</html>
